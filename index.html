<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de LED IoT</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <main class="dashboard-card">
        <header>
            <h1>Painel <span>IoT</span></h1>
            <p>Controle de Iluminação</p>
        </header>

        <div class="led-indicator led-off" id="led-visual"></div>

        <div class="controls">
            <button id="ligar" class="btn btn-on" onclick="mudarStatus(true)">Ligar LED</button>
            <button id="desligar" class="btn btn-off" onclick="mudarStatus(false)">Desligar LED</button>
        </div>

        <div class="status-container">
            <div id="status">Status: <span id="status-display">Carregando...</span></div>
        </div>
    </main>

    <script type="module" src="js/script.js"></script>
</body>

</html>
